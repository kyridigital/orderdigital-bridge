[build]
  command = "npm run build"
  publish = "dist"

# Legacy OrderDigital legal URLs -> canonical Takeaway Growth Agency terms.
# These must come before the SPA fallback below (first match wins).
[[redirects]]
  from = "/merchantserviceagreement"
  to = "https://takeawaygrowthagency.com/terms/merchant-services-terms"
  status = 301
  force = true

[[redirects]]
  from = "/additionalmarketingterms"
  to = "https://takeawaygrowthagency.com/terms/additionalmarketingterms"
  status = 301
  force = true

[[redirects]]
  from = "/thirdpartyintegrationterms"
  to = "https://takeawaygrowthagency.com/terms/thirdpartyintegrationterms"
  status = 301
  force = true

[[redirects]]
  from = "/moneybackguaranteeterms"
  to = "https://takeawaygrowthagency.com/terms/moneybackguaranteeterms"
  status = 301
  force = true

[[redirects]]
  from = "/pricepromisemerchantterms"
  to = "https://takeawaygrowthagency.com/terms/pricepromisemerchantterms"
  status = 301
  force = true

[[redirects]]
  from = "/privacy"
  to = "https://takeawaygrowthagency.com/terms/privacy"
  status = 301
  force = true

# SPA fallback for everything else.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
